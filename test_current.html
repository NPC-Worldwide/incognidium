<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; padding: 30px; }
.section { margin-bottom: 30px; border: 1px solid #ccc; padding: 15px; }
h2 { margin-bottom: 10px; color: #333; }

/* Test 1: Z-Index stacking */
.z-container { position: relative; height: 120px; background: #f0f0f0; }
.z-box { position: absolute; width: 80px; height: 80px; }
.z-red { background: red; top: 10px; left: 10px; z-index: 1; }
.z-green { background: green; top: 30px; left: 30px; z-index: 2; }
.z-blue { background: blue; top: 50px; left: 50px; z-index: 3; }

/* Test 2: Box-shadow with blur */
.shadow-box { width: 100px; height: 60px; background: white; margin: 20px; box-shadow: 0 0 15px red; }

/* Test 3: Absolute positioning */
.abs-container { position: relative; height: 100px; background: #eee; }
.abs-box { position: absolute; width: 60px; height: 60px; background: orange; }
.abs-tr { top: 5px; right: 5px; }

/* Test 4: Text shadow */
.ts-test { font-size: 24px; text-shadow: 2px 2px 5px blue; }

/* Test 5: Transforms */
.t-rotate { width: 80px; height: 80px; background: magenta; transform: rotate(15deg); margin: 20px; }

/* Test 6: CSS Variables */
:root { --main: forestgreen; }
.var-box { background: var(--main); width: 150px; height: 50px; }

/* Test 7: Calc() */
.calc-box { width: calc(100% - 100px); height: 40px; background: coral; }

/* Test 8: Overflow hidden */
.overflow-box { width: 150px; height: 80px; overflow: hidden; border: 2px solid red; }
.overflow-content { width: 300px; height: 150px; background: linear-gradient(45deg, red, blue); }
</style>
</head>
<body>

<div class="section">
<h2>1. Z-Index</h2>
<div class="z-container">
    <div class="z-box z-red"></div>
    <div class="z-box z-green"></div>
    <div class="z-box z-blue"></div>
</div>
</div>

<div class="section">
<h2>2. Box Shadow</h2>
<div class="shadow-box"></div>
</div>

<div class="section">
<h2>3. Absolute Positioning</h2>
<div class="abs-container">
    <div class="abs-box abs-tr">TR</div>
</div>
</div>

<div class="section">
<h2>4. Text Shadow</h2>
<div class="ts-test">Text with shadow</div>
</div>

<div class="section">
<h2>5. Transform</h2>
<div class="t-rotate">Rotate</div>
</div>

<div class="section">
<h2>6. CSS Variables</h2>
<div class="var-box"></div>
</div>

<div class="section">
<h2>7. Calc()</h2>
<div class="calc-box"></div>
</div>

<div class="section">
<h2>8. Overflow Hidden</h2>
<div class="overflow-box">
    <div class="overflow-content"></div>
</div>
</div>

</body>
</html>
