<!DOCTYPE html>
<html>
<head>
    <title>Text Decoration Test</title>
    <style>
        body {
            margin: 40px;
            font-family: sans-serif;
            font-size: 24px;
        }
        .underline {
            text-decoration: underline;
        }
        .line-through {
            text-decoration: line-through;
        }
        .overline {
            text-decoration: overline;
        }
        .combined {
            text-decoration: underline line-through overline;
        }
        .old-style {
            text-decoration: underline;
        }
        p {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Text Decoration Test</h1>

    <p class="underline">This text has an underline</p>

    <p class="line-through">This text has a line-through (strikethrough)</p>

    <p class="overline">This text has an overline</p>

    <p class="combined">This text has all three decorations</p>

    <p class="old-style">This uses the old text-decoration property</p>

    <p>Normal text without decoration</p>
</body>
</html>
