<!DOCTYPE html>
<html>
<head>
    <title>Grid Auto-Placement Test</title>
    <style>
        body {
            margin: 20px;
            font-family: sans-serif;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: #f0f0f0;
            padding: 10px;
        }
        .grid-item {
            background: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 4px;
        }
        .grid-item:nth-child(odd) {
            background: #2196F3;
        }

        /* Test grid-auto-flow: column */
        .grid-column-flow {
            display: grid;
            grid-template-rows: repeat(2, 50px);
            grid-auto-flow: column;
            gap: 5px;
            margin-top: 20px;
            background: #f0f0f0;
            padding: 10px;
        }
        .col-item {
            background: #FF9800;
            color: white;
            padding: 10px;
            text-align: center;
        }

        /* Test implicit rows */
        .grid-implicit {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-auto-rows: 80px;
            gap: 10px;
            margin-top: 20px;
            background: #f0f0f0;
            padding: 10px;
        }
        .implicit-item {
            background: #9C27B0;
            color: white;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Grid Auto-Placement Test</h1>

    <h2>Auto-flow row (default)</h2>
    <div class="grid-container">
        <div class="grid-item">Item 1</div>
        <div class="grid-item">Item 2</div>
        <div class="grid-item">Item 3</div>
        <div class="grid-item">Item 4</div>
        <div class="grid-item">Item 5</div>
        <div class="grid-item">Item 6</div>
    </div>

    <h2>Auto-flow column</h2>
    <div class="grid-column-flow">
        <div class="col-item">A</div>
        <div class="col-item">B</div>
        <div class="col-item">C</div>
        <div class="col-item">D</div>
        <div class="col-item">E</div>
    </div>

    <h2>Implicit rows (grid-auto-rows)</h2>
    <div class="grid-implicit">
        <div class="implicit-item">Explicit 1</div>
        <div class="implicit-item">Explicit 2</div>
        <div class="implicit-item">Implicit 3 (should be 80px)</div>
        <div class="implicit-item">Implicit 4 (should be 80px)</div>
        <div class="implicit-item">Implicit 5 (should be 80px)</div>
    </div>
</body>
</html>
