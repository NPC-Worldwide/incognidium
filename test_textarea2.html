<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="form-group">
        <label>Message:</label>
        <textarea rows="3" cols="30" placeholder="Enter message..."></textarea>
    </div>

    <div class="form-group">
        <label>Description:</label>
        <textarea rows="5" cols="40">Line 1 of text
Line 2 of text
Line 3 of text</textarea>
    </div>

    <div class="form-group">
        <label>No size (default):</label>
        <textarea>Default textarea</textarea>
    </div>
</body>
</html>
