<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 30px; font-family: sans-serif; }
    .box { margin: 10px 0; padding: 10px; }

    /* Test 1: Basic margin collapse */
    .margin-test1 { margin-bottom: 30px; background: red; }
    .margin-test2 { margin-top: 30px; background: blue; }

    /* Test 2: Percentage width */
    .pct-container { width: 400px; background: #eee; }
    .pct-child { width: 50%; background: green; }

    /* Test 3: Text align on inline elements */
    .center-container { text-align: center; border: 1px solid #ccc; }
    .inline-child { display: inline-block; background: orange; padding: 10px; }

    /* Test 4: Collapsing borders on tables */
    .table-test { border-collapse: collapse; }
    .table-test td { border: 1px solid black; padding: 10px; }

    /* Test 5: First-letter pseudo-element */
    .first-letter::first-letter { font-size: 200%; color: purple; }

    /* Test 6: Empty div with height */
    .spacer { height: 50px; background: pink; }
  </style>
</head>
<body>
  <div class="box margin-test1">Margin bottom 30px</div>
  <div class="box margin-test2">Margin top 30px (should collapse to 30px total)</div>

  <div class="pct-container">
    Container 400px
    <div class="pct-child">50% width child should be 200px</div>
  </div>

  <div class="center-container">
    <div class="inline-child">Should be centered</div>
  </div>

  <table class="table-test">
    <tr><td>A</td><td>B</td></tr>
    <tr><td>C</td><td>D</td></tr>
  </table>

  <p class="first-letter">First letter should be larger</p>

  <div class="spacer"></div>
</body>
</html>
