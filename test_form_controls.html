<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 100px; }
    </style>
</head>
<body>
    <div class="form-group">
        <label>Name:</label>
        <input type="text" value="John Doe" placeholder="Enter name">
    </div>
    <div class="form-group">
        <label>Email:</label>
        <input type="text" placeholder="Enter email">
    </div>
    <div class="form-group">
        <label>Comments:</label>
        <textarea rows="4" cols="40">This is a test comment</textarea>
    </div>
    <div class="form-group">
        <input type="checkbox" checked>
        <label style="width:auto;">Subscribe</label>
        <input type="radio" name="gender" checked>
        <label style="width:auto;">Male</label>
        <input type="radio" name="gender">
        <label style="width:auto;">Female</label>
    </div>
</body>
</html>
