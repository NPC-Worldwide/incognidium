<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Arial, sans-serif;
    padding: 40px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
}
.container {
    max-width: 500px;
    margin: 0 auto;
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
h1 {
    color: #333;
    text-align: center;
    margin-bottom: 30px;
}

/* Input styling */
input {
    width: 100%;
    padding: 12px 16px;
    margin: 10px 0;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 16px;
    box-sizing: border-box;
}

/* Default placeholder styling */
::placeholder {
    color: #999;
    font-style: italic;
}

/* Custom placeholder for specific inputs */
input.custom::placeholder {
    color: #ff6b6b;
    font-weight: bold;
    font-size: 14px;
}

input.email::placeholder {
    color: #4ecdc4;
    font-style: normal;
}

input.search::placeholder {
    color: #a29bfe;
    font-size: 13px;
}

label {
    display: block;
    margin-top: 20px;
    margin-bottom: 5px;
    color: #555;
    font-weight: bold;
}

.form-group {
    margin-bottom: 20px;
}
</style>
</head>
<body>
<div class="container">
    <h1>::placeholder Pseudo-element Demo</h1>

    <div class="form-group">
        <label for="name">Default Placeholder</label>
        <input type="text" id="name" placeholder="Enter your name...">
    </div>

    <div class="form-group">
        <label for="custom">Custom Red Placeholder</label>
        <input type="text" id="custom" class="custom" placeholder="This placeholder is red and bold!">
    </div>

    <div class="form-group">
        <label for="email">Teal Placeholder</label>
        <input type="email" id="email" class="email" placeholder="Enter your email address...">
    </div>

    <div class="form-group">
        <label for="search">Purple Search Placeholder</label>
        <input type="search" id="search" class="search" placeholder="Search for something...">
    </div>

    <p style="margin-top: 30px; color: #666; font-size: 14px; line-height: 1.6;">
        The ::placeholder pseudo-element allows you to style the placeholder text in input fields.
        This is useful for creating consistent form designs and improving visual hierarchy.
    </p>
</div>
</body>
</html>
