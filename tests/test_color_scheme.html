<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: system-ui, sans-serif;
  padding: 40px;
  background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
  min-height: 100vh;
}

h1 {
  text-align: center;
  color: #2c3e50;
  margin-bottom: 40px;
}

.demo-section {
  background: white;
  padding: 30px;
  border-radius: 12px;
  margin-bottom: 30px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.demo-section h2 {
  margin-top: 0;
}

.demo-section.dark {
  background: #2c3e50;
  color: white;
}

.demo-section.dark h2 {
  color: #ecf0f1;
}

.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;
  font-weight: bold;
}

/* Light color scheme (default) */
.light-scheme input[type="checkbox"],
.light-scheme input[type="radio"] {
  color-scheme: light;
}

/* Dark color scheme */
.dark-scheme {
  color-scheme: dark;
}

.dark-scheme input[type="checkbox"],
.dark-scheme input[type="radio"] {
  color-scheme: dark;
}

/* Accent color demo */
.accent-demo input[type="checkbox"],
.accent-demo input[type="radio"] {
  accent-color: #e74c3c;
}

.accent-demo.blue input[type="checkbox"],
.accent-demo.blue input[type="radio"] {
  accent-color: #3498db;
}

.accent-demo.green input[type="checkbox"],
.accent-demo.green input[type="radio"] {
  accent-color: #27ae60;
}

.inline {
  display: inline-block;
  margin-right: 20px;
}
</style>
</head>
<body>

<h1>CSS color-scheme Demo</h1>

<div class="demo-section light-scheme">
  <h2>color-scheme: light (default)</h2>
  <div class="form-group">
    <label><input type="checkbox" checked> Checked checkbox</label>
  </div>
  <div class="form-group">
    <label><input type="checkbox"> Unchecked checkbox</label>
  </div>
  <div class="form-group">
    <label><input type="radio" name="light-radio" checked> Selected radio</label>
  </div>
  <div class="form-group">
    <label><input type="radio" name="light-radio"> Unselected radio</label>
  </div>
</div>

<div class="demo-section dark-scheme dark">
  <h2>color-scheme: dark</h2>
  <div class="form-group">
    <label><input type="checkbox" checked> Checked checkbox (dark)</label>
  </div>
  <div class="form-group">
    <label><input type="checkbox"> Unchecked checkbox (dark)</label>
  </div>
  <div class="form-group">
    <label><input type="radio" name="dark-radio" checked> Selected radio (dark)</label>
  </div>
  <div class="form-group">
    <label><input type="radio" name="dark-radio"> Unselected radio (dark)</label>
  </div>
</div>

<div class="demo-section">
  <h2>accent-color variations</h2>
  <div class="inline accent-demo">
    <label><input type="checkbox" checked> Red accent</label>
  </div>
  <div class="inline accent-demo blue">
    <label><input type="checkbox" checked> Blue accent</label>
  </div>
  <div class="inline accent-demo green">
    <label><input type="checkbox" checked> Green accent</label>
  </div>
</div>

</body>
</html>
