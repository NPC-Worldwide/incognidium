<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: system-ui, sans-serif;
  padding: 40px;
  background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
  min-height: 100vh;
}

h1 {
  text-align: center;
  color: #2c3e50;
  margin-bottom: 40px;
}

.demo-section {
  background: white;
  padding: 30px;
  border-radius: 12px;
  margin-bottom: 30px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.demo-section h2 {
  margin-top: 0;
  color: #667eea;
}

.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;
  font-weight: bold;
}

/* Default appearance */
.default input[type="checkbox"],
.default input[type="radio"] {
  appearance: auto;
  -webkit-appearance: auto;
}

/* No appearance - custom styled */
.custom input[type="checkbox"],
.custom input[type="radio"] {
  appearance: none;
  -webkit-appearance: none;
  width: 24px;
  height: 24px;
  border: 2px solid #667eea;
  background: white;
  display: inline-block;
  vertical-align: middle;
  margin-right: 8px;
  position: relative;
}

.custom input[type="checkbox"] {
  border-radius: 4px;
}

.custom input[type="radio"] {
  border-radius: 50%;
}

/* Custom checked states */
.custom input[type="checkbox"]:checked {
  background: #667eea;
}

.custom input[type="checkbox"]:checked::after {
  content: "✓";
  color: white;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 16px;
}

.custom input[type="radio"]:checked {
  background: #667eea;
  border-color: #667eea;
}

.custom input[type="radio"]:checked::after {
  content: "";
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Toggle switch style */
.toggle input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 50px;
  height: 26px;
  background: #ccc;
  border-radius: 13px;
  position: relative;
  cursor: pointer;
  transition: background 0.3s;
  vertical-align: middle;
  margin-right: 10px;
  border: none;
}

.toggle input[type="checkbox"]:checked {
  background: #27ae60;
}

.toggle input[type="checkbox"]::after {
  content: "";
  position: absolute;
  width: 22px;
  height: 22px;
  background: white;
  border-radius: 50%;
  top: 2px;
  left: 2px;
  transition: transform 0.3s;
}

.toggle input[type="checkbox"]:checked::after {
  transform: translateX(24px);
}

.inline {
  display: inline-block;
  margin-right: 30px;
}
</style>
</head>
<body>

<h1>CSS appearance Demo</h1>

<div class="demo-section default">
  <h2>Default Appearance (appearance: auto)</h2>
  <div class="form-group">
    <label><input type="checkbox" checked> Checked checkbox</label>
  </div>
  <div class="form-group">
    <label><input type="radio" name="default-radio" checked> Selected radio</label>
  </div>
</div>

<div class="demo-section custom">
  <h2>Custom Styled (appearance: none)</h2>
  <div class="form-group">
    <label><input type="checkbox" checked> Custom checked checkbox</label>
  </div>
  <div class="form-group">
    <label><input type="checkbox"> Custom unchecked checkbox</label>
  </div>
  <div class="form-group">
    <label><input type="radio" name="custom-radio" checked> Custom selected radio</label>
  </div>
  <div class="form-group">
    <label><input type="radio" name="custom-radio"> Custom unselected radio</label>
  </div>
</div>

<div class="demo-section toggle">
  <h2>Toggle Switch (appearance: none + custom CSS)</h2>
  <div class="form-group">
    <label class="inline"><input type="checkbox" checked> ON</label>
    <label class="inline"><input type="checkbox"> OFF</label>
  </div>
</div>

</body>
</html>
