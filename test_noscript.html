<!DOCTYPE html>
<html>
<head>
    <title>Noscript Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .js-content { display: none; }
        .fallback { background: #ffeb3b; padding: 10px; border: 1px solid #f57f17; }
    </style>
</head>
<body>
    <h1>Noscript Content Test</h1>

    <div id="app">
        <!-- This content is replaced by JS in a real SPA -->
        <div class="loading">Loading... (requires JavaScript)</div>
    </div>

    <noscript>
        <div class="fallback">
            <h2>JavaScript is disabled</h2>
            <p>This is the noscript fallback content. It should be visible when JavaScript is not available or times out.</p>
            <ul>
                <li>Server-rendered content item 1</li>
                <li>Server-rendered content item 2</li>
                <li>Server-rendered content item 3</li>
            </ul>
        </div>
    </noscript>

    <p>Regular paragraph content that should always be visible.</p>
</body>
</html>
